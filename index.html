<!DOCTYPE html>
<html>
<head>
  <title>Welcome | Smart Classroom</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5; /* light background */
      color: #333; /* dark text for contrast */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      text-align: center;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 10px;
      color: #4b0082; /* subtle purple accent */
    }

    p {
      font-size: 1.2em;
      margin-bottom: 20px;
    }

    button {
      background: linear-gradient(90deg, #7f00ff, #e100ff); /* purple gradient */
      color: white;
      border: none;
      padding: 12px 25px;
      font-size: 1em;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <h1>📚 Smart Classroom System</h1>
  <p>Automated classroom monitoring & substitute allocation</p>
  <a href="login.html"><button>Admin Login →</button></a>
  <!-- Background circles -->
  <div class="circle purple"></div>
  <div class="circle pink"></div>
</body>
</html>
